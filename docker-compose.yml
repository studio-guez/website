services:
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5174:5174"
    command: sh -c "npm install && npm run dev"

  build:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npm run build && chown -R ${UID:-1000}:${GID:-1000} /app/docs"
    profiles:
      - build

  web:
    build: .
    ports:
      - "8080:80"
    profiles:
      - production

volumes:
  node_modules:
